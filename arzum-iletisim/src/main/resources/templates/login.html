<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Arzum İletişim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; }
        .login-card { width: 100%; max-width: 400px; padding: 15px; margin: auto; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h3 class="text-center mb-4">Giriş Yap</h3>

            <div th:if="${param.error}" class="alert alert-danger p-2 small">Kullanıcı adı veya şifre hatalı!</div>
            <div th:if="${param.logout}" class="alert alert-success p-2 small">Başarıyla çıkış yapıldı.</div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">Kullanıcı Adı</label>
                    <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Şifre</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••" required>
                </div>
                <button class="btn btn-primary w-100 py-2" type="submit">Giriş Yap</button>
            </form>
        </div>
    </div>
    <p class="mt-3 text-muted text-center small">&copy; 2026 Arzum İletişim</p>
</div>
</body>
</html>
