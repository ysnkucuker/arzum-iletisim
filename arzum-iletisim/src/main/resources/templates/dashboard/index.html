<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Arzum İletişim</title>
</head>
<body>
<div th:replace="~{fragments/header :: headerFragment}"></div>

<div class="container">
    <div class="row">
        <div class="col-12">
            <h2 class="mb-4 text-secondary border-bottom pb-2">Yönetim Paneli Özet</h2>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card bg-primary text-white border-0 shadow-sm">
                <div class="card-body text-center p-4">
                    <h5 class="card-title">Toplam İletişim</h5>
                    <h2 class="display-4 fw-bold">124</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-success text-white border-0 shadow-sm">
                <div class="card-body text-center p-4">
                    <h5 class="card-title">Aktif Kullanıcılar</h5>
                    <h2 class="display-4 fw-bold">12</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-warning text-dark border-0 shadow-sm">
                <div class="card-body text-center p-4">
                    <h5 class="card-title">Yeni Talepler</h5>
                    <h2 class="display-4 fw-bold">5</h2>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
