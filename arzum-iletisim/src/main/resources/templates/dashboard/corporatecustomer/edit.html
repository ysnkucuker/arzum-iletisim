<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Müşteri Düzenle - Arzum İletişim</title></head>
<body>
<div th:replace="~{fragments/header :: headerFragment}"></div>
<div class="container mt-4">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-warning text-dark"><h5><i class="bi bi-pencil-square"></i> Müşteri Bilgilerini Güncelle</h5></div>
        <div class="card-body">
            <form th:action="@{/dashboard/corporatecustomer/update/{id}(id=${customer.id})}" th:object="${customer}" method="post">
                <input type="hidden" th:field="*{id}" />
                <div class="mb-3">
                    <label class="form-label fw-bold">Şirket/Firma Adı</label>
                    <input type="text" th:field="*{companyName}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">İletişim Kurulacak Kişi</label>
                    <input type="text" th:field="*{contactPerson}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">E-Posta Adresi</label>
                    <input type="email" th:field="*{email}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Telefon Numarası</label>
                    <input type="tel" th:field="*{phone}" class="form-control" required>
                </div>
                <div class="d-flex justify-content-between">
                    <a th:href="@{/dashboard/corporatecustomer}" class="btn btn-secondary">Vazgeç</a>
                    <button type="submit" class="btn btn-warning">Değişiklikleri Kaydet</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
