<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Müşteri Ekle - Arzum İletişim</title></head>
<body>
<div th:replace="~{fragments/header :: headerFragment}"></div>
<div class="container mt-4">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white"><h5><i class="bi bi-building-add"></i> Yeni Kurumsal Müşteri</h5></div>
        <div class="card-body">
            <form th:action="@{/dashboard/corporatecustomer/save}" th:object="${customer}" method="post">
                <div class="mb-3">
                    <label class="form-label">Şirket/Firma Adı</label>
                    <input type="text" th:field="*{companyName}" class="form-control" required placeholder="Örn: Arzum İletişim LTD">
                </div>
                <div class="mb-3">
                    <label class="form-label">İletişim Kurulacak Kişi</label>
                    <input type="text" th:field="*{contactPerson}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">E-Posta Adresi</label>
                    <input type="email" th:field="*{email}" class="form-control" required placeholder="ornek@firma.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Telefon Numarası</label>
                    <input type="tel" th:field="*{phone}" class="form-control" required placeholder="05xx xxx xx xx">
                </div>
                <div class="d-flex justify-content-between">
                    <a th:href="@{/dashboard/corporatecustomer}" class="btn btn-secondary">İptal</a>
                    <button type="submit" class="btn btn-success">Müşteriyi Kaydet</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
