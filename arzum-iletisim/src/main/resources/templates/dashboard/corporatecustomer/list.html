<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Müşteriler - Arzum İletişim</title></head>
<body>
<div th:replace="~{fragments/header :: headerFragment}"></div>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-building"></i> Kurumsal Müşteriler</h2>
        <a th:href="@{/dashboard/corporatecustomer/add}" class="btn btn-primary"><i class="bi bi-person-plus"></i> Yeni Müşteri</a>
    </div>
    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-light">
                <tr>
                    <th>Firma Adı</th>
                    <th>İlgili Kişi</th>
                    <th>E-Posta</th>
                    <th>Telefon</th>
                    <th class="text-end">İşlemler</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${customers}">
                    <td class="fw-bold" th:text="${c.companyName}">Arzum A.Ş.</td>
                    <td th:text="${c.contactPerson}">Ahmet Yılmaz</td>
                    <td th:text="${c.email}">iletisim@firma.com</td>
                    <td th:text="${c.phone}">0555...</td>
                    <td class="text-end">
                        <a th:href="@{/dashboard/corporatecustomer/edit/{id}(id=${c.id})}" class="btn btn-sm btn-outline-warning"><i class="bi bi-pencil"></i></a>
                        <a th:href="@{/dashboard/corporatecustomer/delete/{id}(id=${c.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Müşteriyi silmek istediğinize emin misiniz?')"><i class="bi bi-trash"></i></a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
