<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Cari İşlemler - Arzum İletişim</title></head>
<body>
<div th:replace="~{fragments/header :: headerFragment}"></div>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-cash-stack"></i> Cari İşlemler / Ödemeler</h2>
        <a th:href="@{/dashboard/transaction/add}" class="btn btn-primary"><i class="bi bi-plus-circle"></i> Yeni İşlem Ekle</a>
    </div>
    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-striped align-middle">
                <thead>
                <tr>
                    <th>Tarih</th>
                    <th>Müşteri</th>
                    <th>Açıklama</th>
                    <th>Tutar</th>
                    <th class="text-end">İşlemler</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="t : ${transactions}">
                    <td th:text="${#temporals.format(t.transactionDate, 'dd-MM-yyyy HH:mm')}"></td>
                    <td><strong th:text="${t.customer?.companyName}"></strong></td>
                    <td th:text="${t.description}"></td>
                    <td>
                                <span th:classappend="${t.amount < 0} ? 'text-danger' : 'text-success'"
                                      class="fw-bold"
                                      th:text="${#numbers.formatDecimal(t.amount, 1, 2) + ' ₺'}"></span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/dashboard/transaction/edit/{id}(id=${t.id})}" class="btn btn-sm btn-outline-warning"><i class="bi bi-pencil"></i></a>
                        <a th:href="@{/dashboard/transaction/delete/{id}(id=${t.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Silinsin mi?')"><i class="bi bi-trash"></i></a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
