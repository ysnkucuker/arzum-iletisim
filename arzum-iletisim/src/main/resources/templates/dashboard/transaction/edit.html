<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>İşlemi Düzenle - Arzum İletişim</title></head>
<body>
<div th:replace="~{fragments/header :: headerFragment}"></div>
<div class="container mt-4">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-warning"><h5><i class="bi bi-pencil"></i> İşlem Kaydını Güncelle</h5></div>
        <div class="card-body">
            <form th:action="@{/dashboard/transaction/update/{id}(id=${transaction.id})}" th:object="${transaction}" method="post">
                <input type="hidden" th:field="*{id}" />
                <div class="mb-3">
                    <label class="form-label fw-bold">Müşteri</label>
                    <select th:field="*{customer}" class="form-select" required>
                        <option th:each="c : ${customers}" th:value="${c.id}" th:text="${c.companyName}" th:selected="${transaction.customer != null && c.id == transaction.customer.id}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Açıklama</label>
                    <input type="text" th:field="*{description}" class="form-control" required>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Tutar (₺)</label>
                        <input type="number" step="0.01" th:field="*{amount}" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">İşlem Tarihi</label>
                        <input type="datetime-local" th:field="*{transactionDate}" class="form-control" required>
                    </div>
                </div>
                <div class="d-flex justify-content-between mt-3">
                    <a th:href="@{/dashboard/transaction}" class="btn btn-secondary">Vazgeç</a>
                    <button type="submit" class="btn btn-warning">Güncelle</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
