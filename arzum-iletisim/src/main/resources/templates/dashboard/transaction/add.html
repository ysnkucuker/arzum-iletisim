<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>İşlem Ekle - Arzum İletişim</title></head>
<body>
<div th:replace="~{fragments/header :: headerFragment}"></div>
<div class="container mt-4">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white"><h5><i class="bi bi-plus-lg"></i> Yeni Cari İşlem</h5></div>
        <div class="card-body">
            <form th:action="@{/dashboard/transaction/save}" th:object="${transaction}" method="post">
                <div class="mb-3">
                    <label class="form-label">Müşteri Seçimi</label>
                    <select th:field="*{customer}" class="form-select" required>
                        <option value="">Seçiniz...</option>
                        <option th:each="c : ${customers}" th:value="${c.id}" th:text="${c.companyName}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">İşlem Açıklaması</label>
                    <input type="text" th:field="*{description}" class="form-control" placeholder="Örn: Ödeme Alındı, Nakit Tahsilat" required>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Tutar (₺)</label>
                        <input type="number" step="0.01" th:field="*{amount}" class="form-control" required placeholder="0.00">
                        <small class="text-muted">Ödemeler için artı (+), borçlar için eksi (-) değer girebilirsiniz.</small>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">İşlem Tarihi</label>
                        <input type="datetime-local" th:field="*{transactionDate}" class="form-control" required>
                    </div>
                </div>
                <div class="d-flex justify-content-between mt-3">
                    <a th:href="@{/dashboard/transaction}" class="btn btn-secondary">İptal</a>
                    <button type="submit" class="btn btn-success">Kaydet</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
