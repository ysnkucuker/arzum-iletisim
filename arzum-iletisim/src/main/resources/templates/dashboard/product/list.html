<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Ürünler - Arzum İletişim</title></head>
<body>
<div th:replace="~{fragments/header :: headerFragment}"></div>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-box-seam"></i> Ürün Yönetimi</h2>
        <a th:href="@{/dashboard/product/add}" class="btn btn-primary"><i class="bi bi-plus-circle"></i> Yeni Ürün</a>
    </div>
    <div class="card shadow-sm">
        <div class="card-body text-center">
            <table class="table align-middle">
                <thead class="table-light">
                <tr>
                    <th>Görsel</th>
                    <th>Ürün Adı</th>
                    <th>Barkod</th>
                    <th>Kategori</th>
                    <th>İşlemler</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${products}">
                    <td>
                        <img th:if="${p.image != null}" th:src="@{/dashboard/product/display/{id}(id=${p.id})}"
                             style="width: 50px; height: 50px; object-fit: cover;" class="rounded border">
                        <i th:unless="${p.image != null}" class="bi bi-image text-muted" style="font-size: 2rem;"></i>
                    </td>
                    <td th:text="${p.name}">Ürün</td>
                    <td><code th:text="${p.barcode}">12345</code></td>
                    <td><span class="badge bg-info text-dark" th:text="${p.category?.name}">Kategori</span></td>
                    <td>
                        <a th:href="@{/dashboard/product/edit/{id}(id=${p.id})}" class="btn btn-sm btn-outline-warning"><i class="bi bi-pencil"></i></a>
                        <a th:href="@{/dashboard/product/delete/{id}(id=${p.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Emin misiniz?')"><i class="bi bi-trash"></i></a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
