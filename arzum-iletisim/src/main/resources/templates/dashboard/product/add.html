<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Ürün Ekle - Arzum İletişim</title></head>
<body>
<div th:replace="~{fragments/header :: headerFragment}"></div>
<div class="container mt-4">
  <div class="card shadow mx-auto" style="max-width: 600px;">
    <div class="card-header bg-primary text-white"><h5>Yeni Ürün Kaydı</h5></div>
    <div class="card-body">
      <form th:action="@{/dashboard/product/save}" th:object="${product}" method="post" enctype="multipart/form-data">
        <div class="mb-3">
          <label class="form-label">Kategori</label>
          <select th:field="*{category}" class="form-select" required>
            <option value="">Kategori Seçiniz</option>
            <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Ürün Adı</label>
          <input type="text" th:field="*{name}" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Barkod</label>
          <input type="text" th:field="*{barcode}" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">Ürün Görseli</label>
          <input type="file" name="imageFile" class="form-control" accept="image/*">
        </div>
        <div class="d-flex justify-content-between">
          <a th:href="@{/dashboard/product}" class="btn btn-secondary">İptal</a>
          <button type="submit" class="btn btn-success">Kaydet</button>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
