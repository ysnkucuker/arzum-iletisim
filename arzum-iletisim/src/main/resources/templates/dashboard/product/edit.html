<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Ürün Düzenle - Arzum İletişim</title>
</head>
<body>
<div th:replace="~{fragments/header :: headerFragment}"></div>

<div class="container mt-4">
  <div class="card shadow mx-auto" style="max-width: 600px;">
    <div class="card-header bg-warning text-dark d-flex justify-content-between align-items-center">
      <h5 class="mb-0"><i class="bi bi-pencil-square"></i> Ürün Düzenle</h5>
      <small class="fw-bold" th:text="'ID: #' + ${product.id}"></small>
    </div>
    <div class="card-body">
      <form th:action="@{/dashboard/product/update/{id}(id=${product.id})}"
            th:object="${product}" method="post" enctype="multipart/form-data">

        <input type="hidden" th:field="*{id}" />

        <div class="text-center mb-4" th:if="${product.image != null}">
          <label class="form-label d-block text-muted small text-start">Mevcut Görsel:</label>
          <img th:src="@{/dashboard/product/display/{id}(id=${product.id})}"
               class="img-thumbnail shadow-sm" style="max-height: 150px;">
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Kategori</label>
          <select th:field="*{category}" class="form-select" required>
            <option th:each="c : ${categories}"
                    th:value="${c.id}"
                    th:text="${c.name}"
                    th:selected="${product.category != null && c.id == product.category.id}">
            </option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Ürün Adı</label>
          <input type="text" th:field="*{name}" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Barkod</label>
          <input type="text" th:field="*{barcode}" class="form-control" placeholder="000000000000">
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Görseli Değiştir</label>
          <input type="file" name="imageFile" class="form-control" accept="image/*">
          <div class="form-text">Yeni bir görsel seçmezseniz mevcut görsel korunur.</div>
        </div>

        <hr>
        <div class="d-flex justify-content-between">
          <a th:href="@{/dashboard/product}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Vazgeç
          </a>
          <button type="submit" class="btn btn-warning">
            <i class="bi bi-save"></i> Değişiklikleri Uygula
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
