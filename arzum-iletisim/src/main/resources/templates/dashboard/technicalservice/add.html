<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Servis Kaydı - Arzum İletişim</title></head>
<body>
<div th:replace="~{fragments/header :: headerFragment}"></div>
<div class="container mt-4">
    <div class="card shadow mx-auto" style="max-width: 700px;">
        <div class="card-header bg-primary text-white"><h5><i class="bi bi-tools"></i> Servis Formu</h5></div>
        <div class="card-body">
            <form th:action="@{/dashboard/technicalservice/save}" th:object="${technicalService}" method="post">
                <div class="row">
                    <div class="col-md-12 mb-3">
                        <label class="form-label">Ürün Seçimi</label>
                        <select th:field="*{product}" class="form-select" required>
                            <option value="">Ürün Seçiniz...</option>
                            <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name + ' (' + p.barcode + ')'}"></option>
                        </select>
                    </div>
                    <div class="col-md-12 mb-3">
                        <label class="form-label">Hizmet/İşlem Adı</label>
                        <input type="text" th:field="*{serviceName}" class="form-control" placeholder="Örn: Batarya Değişimi" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Kayıt Tarihi</label>
                        <input type="datetime-local" th:field="*{requestDate}" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Tamamlanma Tarihi</label>
                        <input type="datetime-local" th:field="*{completionDate}" class="form-control">
                    </div>
                    <div class="col-md-12 mb-3">
                        <label class="form-label">Açıklama / Arıza Notu</label>
                        <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                    </div>
                </div>
                <div class="d-flex justify-content-between mt-3">
                    <a th:href="@{/dashboard/technicalservice}" class="btn btn-secondary">İptal</a>
                    <button type="submit" class="btn btn-success">Kaydı Tamamla</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
