<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Teknik Servis - Arzum İletişim</title></head>
<body>
<div th:replace="~{fragments/header :: headerFragment}"></div>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-wrench"></i> Teknik Servis Kayıtları</h2>
        <a th:href="@{/dashboard/technicalservice/add}" class="btn btn-primary"><i class="bi bi-plus-circle"></i> Yeni Kayıt</a>
    </div>
    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-striped align-middle">
                <thead>
                <tr>
                    <th>Ürün</th>
                    <th>İşlem Adı</th>
                    <th>Giriş Tarihi</th>
                    <th>Durum</th>
                    <th class="text-end">İşlemler</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="ts : ${services}">
                    <td>
                        <strong th:text="${ts.product?.name}">Ürün</strong><br>
                        <small class="text-muted" th:text="${ts.product?.barcode}"></small>
                    </td>
                    <td th:text="${ts.serviceName}">Ekran Tamiri</td>
                    <td th:text="${#temporals.format(ts.requestDate, 'dd-MM-yyyy HH:mm')}">01-01-2026</td>
                    <td>
                        <span th:if="${ts.completionDate == null}" class="badge bg-warning text-dark">Bekliyor</span>
                        <span th:if="${ts.completionDate != null}" class="badge bg-success">Tamamlandı</span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/dashboard/technicalservice/edit/{id}(id=${ts.id})}" class="btn btn-sm btn-outline-warning"><i class="bi bi-pencil"></i></a>
                        <a th:href="@{/dashboard/technicalservice/delete/{id}(id=${ts.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Silinsin mi?')"><i class="bi bi-trash"></i></a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
