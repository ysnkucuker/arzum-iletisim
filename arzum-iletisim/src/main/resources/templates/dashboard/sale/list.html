<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Satışlar - Arzum İletişim</title></head>
<body>
<div th:replace="~{fragments/header :: headerFragment}"></div>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-cart-check"></i> Satış Kayıtları</h2>
        <a th:href="@{/dashboard/sale/add}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Yeni Satış Yap</a>
    </div>
    <div class="card shadow-sm text-center">
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>Tarih</th>
                    <th>Müşteri</th>
                    <th>Ürün</th>
                    <th>Tutar</th>
                    <th>İşlemler</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s : ${sales}">
                    <td th:text="${#temporals.format(s.saleDate, 'dd-MM-yyyy HH:mm')}">Tarih</td>
                    <td><strong th:text="${s.customer?.companyName}">Müşteri</strong></td>
                    <td th:text="${s.product?.name}">Ürün</td>
                    <td><span class="badge bg-success" th:text="${#numbers.formatDecimal(s.amount, 1, 2) + ' ₺'}">0.00 ₺</span></td>
                    <td>
                        <a th:href="@{/dashboard/sale/edit/{id}(id=${s.id})}" class="btn btn-sm btn-outline-warning"><i class="bi bi-pencil"></i></a>
                        <a th:href="@{/dashboard/sale/delete/{id}(id=${s.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Satış kaydı silinecek, emin misiniz?')"><i class="bi bi-trash"></i></a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
