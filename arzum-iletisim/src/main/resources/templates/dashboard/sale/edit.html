<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Satışı Güncelle - Arzum İletişim</title></head>
<body>
<div th:replace="~{fragments/header :: headerFragment}"></div>
<div class="container mt-4">
  <div class="card shadow mx-auto" style="max-width: 650px;">
    <div class="card-header bg-warning text-dark"><h5><i class="bi bi-pencil-square"></i> Satış Kaydı Güncelleme</h5></div>
    <div class="card-body">
      <form th:action="@{/dashboard/sale/update/{id}(id=${sale.id})}" th:object="${sale}" method="post">
        <input type="hidden" th:field="*{id}" />
        <div class="mb-3">
          <label class="form-label fw-bold">Müşteri</label>
          <select th:field="*{customer}" class="form-select" required>
            <option th:each="c : ${customers}" th:value="${c.id}" th:text="${c.companyName}" th:selected="${sale.customer != null && c.id == sale.customer.id}"></option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Ürün</label>
          <select th:field="*{product}" class="form-select" required>
            <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name}" th:selected="${sale.product != null && p.id == sale.product.id}"></option>
          </select>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Tutar (₺)</label>
            <input type="number" step="0.01" th:field="*{amount}" class="form-control" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Tarih</label>
            <input type="datetime-local" th:field="*{saleDate}" class="form-control" required>
          </div>
        </div>
        <div class="d-flex justify-content-between mt-3">
          <a th:href="@{/dashboard/sale}" class="btn btn-secondary">Vazgeç</a>
          <button type="submit" class="btn btn-warning">Güncelle</button>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
